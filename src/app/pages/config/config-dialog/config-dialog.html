<div class="dialog-container" (keydown.esc)="close()">
    <h2 class="text-neon">Configurações 📡</h2>

    <div class="form-group">
        <label class="label-accent">🌐 Importar Playlist M3U</label>
        <div class="input-row-import">
            <input #urlInput tabindex="0" class="neon-input" id="urlInput" [(ngModel)]="m3uUrl"
                placeholder="http://servidor.com/playlist.m3u" (keydown.enter)="importFromUrl()" />

            <button class="ultrix-btn icon-btn" (click)="importFromUrl()" [disabled]="isLoading" tabindex="0">
                <span *ngIf="!isLoading">➕</span>
                <span *ngIf="isLoading" class="spinner">⟳</span>
            </button>
        </div>
    </div>

    <div *ngIf="importSuccess" class="text-success feedback-msg">{{importSuccess}}</div>
    <div *ngIf="importError" class="text-danger feedback-msg">{{importError}}</div>

    <div class="divider"></div>

    <div class="info-grid">
        <div class="info-row">
            <span class="info-label">TV MAC ID</span>
            <span class="info-value highlight">{{config.macId}}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Código TV</span>
            <span class="info-value highlight">{{config.tvCode}}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Suporte ⭐</span>
            <span class="info-value text-success">{{config.phoneNumberSupport}}</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="server-section" *ngIf="servers.length > 0">
        <p class="section-title">Servidores Disponíveis</p>
        <div class="scrollable-list">
            @for (server of servers; track server.id) {
            <div class="server-item" [class.active]="server.active" tabindex="0" (click)="selectServerActive(server)"
                (keydown.enter)="selectServerActive(server)">

                <div class="server-info">
                    <mat-icon class="icon-muted">{{ server.active ? 'dns' : 'folder' }}</mat-icon>
                    <span class="server-name">Servidor #{{server.number}}</span>
                </div>

                <div class="item-actions">
                    <mat-icon *ngIf="server.active" class="text-success">check_circle</mat-icon>
                    <button class="delete-btn" tabindex="0" (click)="removeServer(server); $event.stopPropagation()"
                        (keydown.enter)="removeServer(server); $event.stopPropagation()">
                        <mat-icon>delete_outline</mat-icon>
                    </button>
                </div>
            </div>
            }
        </div>
    </div>

    <div class="actions">
        <button class="ultrix-btn secondary" tabindex="0" (click)="close()" (keydown.enter)="close()">Sair</button>
    </div>
</div>
