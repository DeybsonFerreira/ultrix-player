<div class="home-container">

    <!-- TOPO (PRETO COM LOGO) -->
    <div class="header">
        <img src="logo.png" class="main-logo">
    </div>

    <!-- PARTE DE BAIXO (CARDS) -->
    <div class="content">

        <div class="grid">

            <div class="ultrix-card" tabindex="0" (click)="goLive()">
                <img src="icons/tv.png">
                <span>TV Ao Vivo</span>
            </div>

            <div class="ultrix-card" tabindex="0">
                <img src="icons/filmes.png">
                <span>Filmes</span>
            </div>

            <div class="ultrix-card" tabindex="0">
                <img src="icons/series.png">
                <span>Séries</span>
            </div>

            <div class="ultrix-card" tabindex="0" (click)="openConfig()">
                <img src="icons/config.png">
                <span>Configurações</span>
            </div>

        </div>

    </div>

</div>
